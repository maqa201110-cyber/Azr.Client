name: Azr Build Fixed
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Klasorleri ve Dosyalari Duzelt
        run: |
          mkdir -p src/main/java/com/azr/client/module/modules
          mkdir -p src/main/java/com/azr/client/mixin
          mkdir -p gradle/wrapper
          
          # Java dosyalarini tasi
          mv AzrClient.java src/main/java/com/azr/client/ || true
          mv Modül.java ModülKategorisi.java ClickGUI.java src/main/java/com/azr/client/module/ || true
          mv KillAura.java src/main/java/com/azr/client/module/modules/ || true
          mv MinecraftClientMixin.java EntityVelocityUpdateS2CPacketMixin.java src/main/java/com/azr/client/mixin/ || true
          
          # Gradle adini duzelt
          mv ayarlar.gradle settings.gradle || true

      - name: Gradle Surumunu Dusur (Hata Cozumu)
        run: |
          printf "distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\://services.gradle.org/distributions/gradle-8.10-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists" > gradle/wrapper/gradle-wrapper.properties

      - name: Derlemeyi Baslat
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew build
          
      - name: Modu Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: Azr-Hile-Modu
          path: build/libs/*.jar
          
